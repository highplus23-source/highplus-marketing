<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Soft background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f0f7ff" />
    </linearGradient>

    <!-- Vibrant primary gradient for the H -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>

    <!-- Warm accent gradient for the Plus -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>

    <!-- Soft drop shadow for elements -->
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#1e3a8a" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background circle with soft styling -->
  <circle cx="60" cy="60" r="56" fill="url(#bgGrad)" stroke="#e0e7ff" stroke-width="2" />

  <!-- The "H" Lettermark (Softened, rounded edges) -->
  <path d="M 36 34 
           C 36 30 40 30 40 30 
           L 48 30 
           C 52 30 52 34 52 34 
           L 52 52
           L 68 52
           L 68 34
           C 68 30 72 30 72 30
           L 80 30
           C 84 30 84 34 84 34
           L 84 86
           C 84 90 80 90 80 90
           L 72 90
           C 68 90 68 86 68 86
           L 68 68
           L 52 68
           L 52 86
           C 52 90 48 90 48 90
           L 40 90
           C 36 90 36 86 36 86 
           Z" 
        fill="url(#primaryGrad)" 
        filter="url(#softShadow)" />

  <!-- The "Plus" Symbol (Friendly, pill-shaped intersecting lines) -->
  <!-- We place it dynamically attached to the upper right area to signify growth/addition -->
  <g transform="translate(76, 32)" filter="url(#softShadow)">
    <circle cx="16" cy="16" r="16" fill="#ffffff" />
    <!-- Horizontal part of + -->
    <rect x="8" y="13.5" width="16" height="5" rx="2.5" fill="url(#accentGrad)" />
    <!-- Vertical part of + -->
    <rect x="13.5" y="8" width="5" height="16" rx="2.5" fill="url(#accentGrad)" />
  </g>
</svg>
