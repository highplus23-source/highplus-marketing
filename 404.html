<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 - HighPlus</title>
    <meta name="description" content="요청하신 페이지를 찾을 수 없습니다. HighPlus 홈으로 돌아가세요.">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <link rel="shortcut icon" href="img/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8faff;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
        }

        .error-code {
            font-size: clamp(80px, 20vw, 160px);
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 24px;
        }

        h1 {
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 700;
            margin-bottom: 12px;
            color: #1e293b;
        }

        p {
            color: #64748b;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 480px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        a.btn {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        a.btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
        }

        a.btn-primary:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        a.btn-outline {
            border: 2px solid #3b82f6;
            color: #2563eb;
            background: transparent;
        }

        a.btn-outline:hover {
            background: #eff6ff;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <div class="error-code">404</div>
    <h1>페이지를 찾을 수 없어요 😢</h1>
    <p>
        요청하신 페이지가 삭제되었거나 주소가 변경되었을 수 있습니다.<br>
        아래 버튼을 눌러 HighPlus 홈으로 돌아가세요.
    </p>
    <div class="btn-group">
        <a href="/" class="btn btn-primary">홈으로 돌아가기</a>
        <a href="/#contact" class="btn btn-outline">무료 컨설팅 신청</a>
    </div>
</body>

</html>
